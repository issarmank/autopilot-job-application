<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #0f172a;
    }
    header {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 16px; border-bottom: 1px solid #e5e7eb;
    }
    header .logo {
      width: 22px; height: 22px; border-radius: 6px; background: #2563eb;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    header h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
    main { padding: 12px 16px 16px; display: flex; flex-direction: column; gap: 10px; }
    #status {
      font-size: 12px; color: #64748b; padding: 6px 10px;
      background: #f8fafc; border-radius: 8px; display: none;
    }
    #status.error { color: #b91c1c; background: #fee2e2; display: block; }
    #status.success { color: #15803d; background: #dcfce7; display: block; }
    #status.info { display: block; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .row { display: flex; gap: 8px; }
    .row .field { flex: 1; }
    label { font-size: 11px; font-weight: 600; color: #374151; }
    input {
      height: 32px; padding: 0 10px; font-size: 13px;
      border: 1px solid #e5e7eb; border-radius: 8px; outline: none; width: 100%;
    }
    input:focus { border-color: #2563eb; }
    .buttons { display: flex; gap: 8px; margin-top: 4px; }
    button {
      flex: 1; height: 34px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #extract-btn { background: #f1f5f9; color: #334155; }
    #extract-btn:hover:not(:disabled) { background: #e2e8f0; }
    #save-btn { background: #2563eb; color: #fff; }
    #save-btn:hover:not(:disabled) { background: #1d4ed8; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <svg width="14" height="14" viewBox="0 0 26 26" fill="none">
        <polyline points="7,17 11,12 14,15 19,9" stroke="white" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
    </div>
    <h1>JobPilot — Save Application</h1>
  </header>

  <main>
    <div id="status"></div>

    <div class="field">
      <label for="title">Job Title</label>
      <input id="title" type="text" placeholder="e.g. Software Engineer Intern" />
    </div>

    <div class="field">
      <label for="company">Company</label>
      <input id="company" type="text" placeholder="e.g. Stripe" />
    </div>

    <div class="field">
      <label for="location">Location</label>
      <input id="location" type="text" placeholder="Remote or City, State" />
    </div>

    <div class="row">
      <div class="field">
        <label for="salaryMin">Min Salary ($/yr)</label>
        <input id="salaryMin" type="number" placeholder="120000" />
      </div>
      <div class="field">
        <label for="salaryMax">Max Salary ($/yr)</label>
        <input id="salaryMax" type="number" placeholder="160000" />
      </div>
    </div>

    <div class="field">
      <label for="sourceUrl">Posting URL</label>
      <input id="sourceUrl" type="url" placeholder="https://…" />
    </div>

    <div class="buttons">
      <button id="extract-btn" type="button">✨ Extract with AI</button>
      <button id="save-btn" type="button">Save to JobPilot</button>
    </div>
  </main>

  <script src="popup.js"></script>
</body>
</html>
